<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMY-TaskTime v2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container full-mode" id="app">
        <div class="drag-handle" id="dragHandle">
            <button class="mode-toggle" id="modeToggle" title="切换精简模式">↙</button>
            <button class="window-close-btn" id="windowCloseBtn" title="隐藏到托盘" style="display: none;">×</button>
        </div>

        <div class="focus-panel">
        <div class="clock-section">
            <div class="analog-clock" aria-hidden="true">
                <div class="analog-face">
                    <span class="clock-num n12">12</span>
                    <span class="clock-num n3">3</span>
                    <span class="clock-num n6">6</span>
                    <span class="clock-num n9">9</span>
                    <span class="clock-tick t1"></span>
                    <span class="clock-tick t2"></span>
                    <span class="clock-tick t4"></span>
                    <span class="clock-tick t5"></span>
                    <span class="clock-tick t7"></span>
                    <span class="clock-tick t8"></span>
                    <span class="clock-tick t10"></span>
                    <span class="clock-tick t11"></span>
                    <span class="clock-hand hour-hand" id="hourHand"></span>
                    <span class="clock-hand minute-hand" id="minuteHand"></span>
                    <span class="clock-hand second-hand" id="secondHand"></span>
                    <span class="clock-pin"></span>
                </div>
                <div class="analog-date" id="analogDate">--</div>
            </div>
            <div class="clock-row">
                <span class="clock-icon" aria-hidden="true">🕙</span>
                <div class="clock" id="clock">00:00:00</div>
            </div>
            <div class="clock-sub">专注工作 · 心流时刻</div>
        </div>

        <div class="focus-divider" aria-hidden="true"></div>

        <div class="primary-task" id="primaryTask">
            <div class="primary-card idle" id="primaryCard">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="primary-name" id="primaryName">MMY-TaskTime</div>
                <div class="primary-timer" id="primaryTimer">点击下方任务开始</div>
                <div class="primary-controls">
                    <button class="ctrl-btn stop" id="stopBtn">停止</button>
                </div>
            </div>
        </div>
        </div>

        <div class="running-tasks-bar" id="runningBar"></div>

        <div class="quick-tasks">
            <div class="section-title">常驻任务（可并行运行）</div>
            <div class="quick-grid" id="quickGrid"></div>
            <div class="mini-next-task" id="miniNextTask"></div>
        </div>

        <div class="task-list-section">
            <div class="task-list-header">
                <div class="section-title">自定义任务</div>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>

        <div class="add-task-form" id="addTaskForm" style="display: none;">
            <input type="text" class="form-input" id="taskNameInput" placeholder="任务名称" maxlength="20">
            <div class="form-row">
                <input type="number" class="form-input form-input-small" id="taskDurationInput" placeholder="分钟" min="1" max="180" value="15">
                <label class="checkbox-label">
                    <input type="checkbox" id="taskLoopCheck">
                    <span>循环</span>
                </label>
            </div>
            <div class="form-buttons">
                <button class="form-btn form-btn-cancel" id="cancelAddBtn">取消</button>
                <button class="form-btn form-btn-confirm" id="confirmAddBtn">确认</button>
            </div>
        </div>

        <div class="bottom-bar">
            <button class="bar-btn" id="settingsBtn" title="设置">⚙</button>
            <button class="bar-btn add-task-btn" id="addTaskBtn" title="添加自定义任务">+</button>
            <button class="bar-btn" id="themeToggleBtn" title="黑白模式">◐</button>
            <button class="bar-btn" id="statsBtn" title="统计">📊</button>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>⚙ 设置</h3>
                <button class="modal-close" data-modal="settingsModal">×</button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <span>打卡提醒</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="clockReminderToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>上班时间</span>
                    <input type="time" class="time-input" id="startTimeInput" value="09:30">
                </div>
                <div class="setting-row">
                    <span>下班时间</span>
                    <input type="time" class="time-input" id="endTimeInput" value="19:30">
                </div>
                <div class="setting-row">
                    <span>声音提醒</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="soundToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <span>桌面通知</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="notificationToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="quick-settings">
                    <div class="quick-settings-title">常驻任务</div>
                    <div class="quick-settings-list" id="quickTaskSettings"></div>
                    <div class="quick-settings-actions">
                        <button class="form-btn form-btn-cancel" id="resetQuickTasksBtn">恢复默认</button>
                        <button class="form-btn form-btn-confirm" id="saveQuickTasksBtn">保存常驻任务</button>
                    </div>
                </div>
                <div class="setting-row" id="autostartRow" style="display: none;">
                    <span>开机自启动</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autostartToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-row" id="quitRow" style="display: none; border-bottom: none; justify-content: center; padding-top: 16px;">
                    <button class="quit-app-btn" id="quitAppBtn">退出应用</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="statsModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📊 统计</h3>
                <button class="modal-close" data-modal="statsModal">×</button>
            </div>
            <div class="modal-body">
                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-value" id="todayDuration">0分</div>
                        <div class="stat-label">今日时长</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="todayCount">0</div>
                        <div class="stat-label">今日完成</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="weekDuration">0分</div>
                        <div class="stat-label">本周时长</div>
                    </div>
                </div>
                <div class="stats-details">
                    <h4>今日明细</h4>
                    <div class="stats-list" id="statsList"></div>
                </div>
                <button class="export-btn" id="exportBtn">导出HTML报告</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
